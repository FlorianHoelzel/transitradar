services:
  vbb-rest:
    image: ghcr.io/florianhoelzel/vbb-rest:v6_3644e5e_2026-07-01t20.26.23z
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/1
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - vbb-redis:/data

volumes:
  vbb-redis:
