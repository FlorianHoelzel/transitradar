events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $sent_http_content_type $asset_expires {
        default off;
        ~^image/ 30d;
        ~^font/ 1y;
        text/css 7d;
        application/javascript 7d;
    }

    expires $asset_expires;

    server {
        listen 80;
        server_name berlin.transitradar.de;

        root /usr/share/nginx/html;

        location = /robots.txt {
            try_files /robots-berlin.txt =404;
        }

        location = /sitemap.xml {
            try_files /sitemap-berlin.xml =404;
        }

        location = /city {
            return 301 /;
        }

        location = /city.html {
            return 301 /;
        }

        location = /status {
            return 301 https://status.transitradar.de/;
        }

        location = /status.html {
            return 301 https://status.transitradar.de/;
        }

        location = / {
            try_files /city-berlin.html =404;
        }

        location = /index {
            return 301 /;
        }

        location = /index.html {
            return 301 /;
        }

        location ~ ^/(.+)\.html$ {
            return 301 /$1;
        }

        location / {
            try_files $uri $uri/ $uri.html =404;
        }
    }

