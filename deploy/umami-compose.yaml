services:
  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://umami:${UMAMI_DB_PASSWORD:?Set UMAMI_DB_PASSWORD}@umami-db:5432/umami"
      APP_SECRET: "${UMAMI_APP_SECRET:?Set UMAMI_APP_SECRET}"
    expose:
      - "3000"
    init: true
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail http://localhost:3000/api/heartbeat || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  umami-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: "${UMAMI_DB_PASSWORD:?Set UMAMI_DB_PASSWORD}"
      TZ: UTC
      PGTZ: UTC
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U umami -d umami
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  umami-db-data:
