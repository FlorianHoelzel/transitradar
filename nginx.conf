events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        location = /index.html {
            return 301 /;
        }

        rewrite ^/(.+)\.html$ /$1 permanent;
    }
}