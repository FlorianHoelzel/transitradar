<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- CITY_SEO_START -->
    <title>TransitRadar – Live-ÖPNV-Karte</title>
    <meta
        name="description"
        content="Interaktive ÖPNV-Karte mit Haltestellen, Abfahrten und aktuellen Verkehrsinformationen."
    >
    <meta name="theme-color" content="#08090d">
    <!-- CITY_SEO_END -->
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/icons/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/search.css">
    <link rel="stylesheet" href="./styles/route-planner.css">
    <link rel="stylesheet" href="./styles/filters.css">
    <link rel="stylesheet" href="./styles/stations.css">
    <link rel="stylesheet" href="./styles/vehicles.css">
    <link rel="stylesheet" href="./styles/routes.css">
    <link rel="stylesheet" href="./styles/sidebar.css">
    <link rel="stylesheet" href="./styles/settings.css">
    <link rel="stylesheet" href="./styles/about.css">
    <link rel="stylesheet" href="./styles/api-status.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <link rel="stylesheet" href="./styles/location.css">
    <link rel="stylesheet" href="./styles/city.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
</head>

<body class="city-app berlin-v2">
    <!-- CITY_SUMMARY_START -->
    <section class="city-summary" aria-labelledby="citySummaryTitle">
        <h1 id="citySummaryTitle">Live-ÖPNV-Karte</h1>
        <p id="citySummaryText">
            Entdecke Haltestellen, aktuelle Abfahrten und Verkehrsinformationen
            auf einer interaktiven Karte.
        </p>
    </section>
    <!-- CITY_SUMMARY_END -->

    <div class="route-field" aria-hidden="true"></div>

    <header class="berlin-v2-topbar" aria-label="TransitRadar">
        <a class="brand" href="https://transitradar.de/">
            TransitRadar
        </a>

        <nav class="berlin-v2-links" aria-label="Seitennavigation">
            <a class="nav-link" href="https://status.transitradar.de/">API-Status</a>
        </nav>
    </header>

    <div id="topSearchControls" class="top-search-controls">
        <div class="search-box">
            <input
                id="searchInput"
                type="text"
                placeholder="Haltestelle suchen …"
                autocomplete="new-password"
                name="transitradar-search"
                spellcheck="false"
            >

            <button
                id="stationSearchRestore"
                class="station-search-restore"
                type="button"
                aria-label="Haltestellensuche öffnen"
                title="Haltestelle suchen"
                tabindex="-1"
            >
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-4-4"></path>
                </svg>
            </button>

            <div id="searchResults"></div>
        </div>

        <button
            id="routePlannerToggle"
            class="route-planner-toggle liquid-button"
            type="button"
            aria-label="Route planen"
            aria-controls="routePlannerPanel"
            aria-expanded="false"
            title="Route planen"
        >
            <svg aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="6" cy="19" r="3"></circle>
                <path d="M9 19h5.5a3.5 3.5 0 0 0 0-7h-5a3.5 3.5 0 0 1 0-7H18"></path>
                <circle cx="18" cy="5" r="3"></circle>
            </svg>
        </button>

        <section
            id="routePlannerPanel"
            class="route-planner-panel liquid-glass"
            aria-labelledby="routePlannerTitle"
            aria-hidden="true"
            inert
        >
        <div class="route-planner-handle" aria-hidden="true"></div>

        <header class="route-planner-header">
            <div>
                <div class="route-planner-kicker">Unterwegs mit TransitRadar</div>
                <h2 id="routePlannerTitle">Route planen</h2>
            </div>

            <button
                id="routePlannerClose"
                class="route-planner-close"
                type="button"
                aria-label="Routenplaner schließen"
                title="Schließen"
            >
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
        </header>

        <div class="route-planner-fields">
            <div class="route-planner-points" aria-hidden="true">
                <span class="route-point route-point-origin"></span>
                <span class="route-point-line"></span>
                <span class="route-point route-point-destination"></span>
            </div>

            <div class="route-planner-inputs">
                <label class="route-planner-field">
                    <span>Start</span>
                    <input
                        id="routePlannerOrigin"
                        type="text"
                        placeholder="Standort oder Haltestelle"
                        autocomplete="off"
                    >
                    <div
                        id="routePlannerOriginSuggestions"
                        class="route-planner-suggestions"
                        role="listbox"
                    ></div>
                </label>

                <label class="route-planner-field">
                    <span>Ziel</span>
                    <input
                        id="routePlannerDestination"
                        type="text"
                        placeholder="Wohin möchtest du?"
                        autocomplete="off"
                    >
                    <div
                        id="routePlannerDestinationSuggestions"
                        class="route-planner-suggestions"
                        role="listbox"
                    ></div>
                </label>
            </div>

            <button
                id="routePlannerSwap"
                class="route-planner-swap"
                type="button"
                aria-label="Start und Ziel tauschen"
                title="Start und Ziel tauschen"
            >
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="m7 16-4-4 4-4"></path>
                    <path d="M3 12h18"></path>
                    <path d="m17 8 4 4-4 4"></path>
                </svg>
            </button>
        </div>

        <div class="route-planner-options">
            <label class="route-planner-time">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M12 7v5l3 2"></path>
                </svg>
                <span class="route-planner-option-label">Zeit</span>
                <select id="routePlannerTime" aria-label="Abfahrts- oder Ankunftszeit">
                    <option value="now">Jetzt</option>
                    <option value="departure">Abfahrt später</option>
                    <option value="arrival">Ankunft bis</option>
                </select>
            </label>

            <input
                id="routePlannerDateTime"
                class="route-planner-datetime"
                type="datetime-local"
                aria-label="Datum und Uhrzeit"
                hidden
            >
        </div>

        <button id="routePlannerSubmit" class="route-planner-submit" type="button" disabled>
            Verbindungen suchen
        </button>

        <p id="routePlannerStatus" class="route-planner-note" aria-live="polite">
            Start und Ziel auswählen.
        </p>

        <div id="routePlannerResults" class="route-planner-results"></div>
        </section>
    </div>

    <div class="filter-control">
        <button
            id="filterToggle"
            class="filter-toggle"
        >
            Filter
        </button>

        <div
            id="filterPanel"
            class="filter-panel"
        >
            <div class="filter-section">
                <div class="filter-panel-title">Haltestellen</div>

                <button
                    class="filter-option active"
                    data-filter-group="stations"
                    data-filter="suburban"
                >
                    S-Bahn
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="stations"
                    data-filter="subway"
                >
                    U-Bahn
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="stations"
                    data-filter="surface"
                >
                    Bus / Straßenbahn
                </button>
            </div>

            <div class="filter-section" data-filter-section="vehicles">
                <div class="filter-panel-title">Live-Fahrzeuge</div>

                <button
                    class="filter-option active"
                    data-filter-group="vehicles"
                    data-filter="suburban"
                >
                    S-Bahn
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="vehicles"
                    data-filter="subway"
                >
                    U-Bahn
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="vehicles"
                    data-filter="surface"
                >
                    Bus / Straßenbahn
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="vehicles"
                    data-filter="regional"
                >
                    RE / RB / RJ / FEX
                </button>

                <button
                    class="filter-option active"
                    data-filter-group="vehicles"
                    data-filter="longDistance"
                >
                    ICE / IC / EC
                </button>
            </div>
        </div>
    </div>

    <main class="berlin-v2-map-shell" aria-label="ÖPNV-Karte">
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./js/main.js?v=city-1"></script>
    <script type="module" src="./js/cityPage.js?v=city-1"></script>
</body>
</html>
