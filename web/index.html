<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TransitRadar – Live-ÖPNV-Karten für Berlin, Hamburg & Frankfurt</title>
    <meta
        name="description"
        content="TransitRadar zeigt Live-Fahrzeuge, Haltestellen, Abfahrten und Verspätungen auf interaktiven ÖPNV-Karten für Berlin, Hamburg und Frankfurt."
    >
    <meta name="theme-color" content="#08090d">
    <link rel="canonical" href="https://transitradar.de/">
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/icons/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="de_DE">
    <meta property="og:site_name" content="TransitRadar">
    <meta property="og:title" content="TransitRadar – Live-ÖPNV-Karten">
    <meta
        property="og:description"
        content="Entdecke den öffentlichen Nahverkehr in Berlin, Hamburg und Frankfurt auf einer interaktiven Karte."
    >
    <meta property="og:url" content="https://transitradar.de/">
    <meta property="og:image" content="https://transitradar.de/assets/landing/berlin-neu.png">
    <meta property="og:image:alt" content="TransitRadar Live-ÖPNV-Karte">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TransitRadar – Live-ÖPNV-Karten">
    <meta
        name="twitter:description"
        content="Live-Fahrzeuge, Haltestellen und aktuelle Abfahrten für Berlin, Hamburg und Frankfurt."
    >
    <meta name="twitter:image" content="https://transitradar.de/assets/landing/berlin-neu.png">

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "TransitRadar",
            "url": "https://transitradar.de/",
            "description": "Interaktive Live-ÖPNV-Karten für Berlin, Hamburg und Frankfurt",
            "inLanguage": "de"
        }
    </script>

    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/landing.css">
    <link
        rel="preload"
        as="image"
        href="./assets/landing/berlin-neu-640.webp"
        imagesrcset="./assets/landing/berlin-neu-640.webp 640w, ./assets/landing/berlin-neu-1254.webp 1254w"
        imagesizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
        type="image/webp"
    >
    <link
        rel="preload"
        as="image"
        href="./assets/landing/hamburg-neu-640.webp"
        imagesrcset="./assets/landing/hamburg-neu-640.webp 640w, ./assets/landing/hamburg-neu-1254.webp 1254w"
        imagesizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
        type="image/webp"
    >
    <link
        rel="preload"
        as="image"
        href="./assets/landing/frankfurt-rmv-640.webp"
        imagesrcset="./assets/landing/frankfurt-rmv-640.webp 640w, ./assets/landing/frankfurt-rmv-1254.webp 1254w"
        imagesizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
        type="image/webp"
    >
</head>

<body>
    <main class="landing-shell">
        <div class="route-field" aria-hidden="true"></div>

        <section class="hero">
            <nav class="topbar" aria-label="TransitRadar">
                <a class="brand" href="/">TransitRadar</a>
            </nav>

            <div class="hero-grid">
                <div class="hero-copy">
                    <p class="eyebrow">Dein ÖPNV-Radar</p>
                    <h1>Wähle deine Stadt.</h1>
                </div>
            </div>
        </section>

        <section class="city-section" aria-label="Stadtauswahl">
            <div class="city-grid">
                <a
                    class="city-card city-card--ready"
                    href="https://berlin.transitradar.de/"
                    aria-label="Berlin: Live"
                    style="--accent: #f7c948; --delay: 0ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/berlin-neu-640.webp 640w, ./assets/landing/berlin-neu-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/berlin-neu.png"
                            alt=""
                            width="1254"
                            height="1254"
                            decoding="async"
                            fetchpriority="high"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Berlin</strong></span>
                        <span class="city-meta">
                            <span class="city-network">VBB</span>
                            <span class="city-status city-status--online">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Live
                            </span>
                        </span>
                    </span>
                </a>

                <a
                    class="city-card city-card--ready"
                    href="https://hamburg.transitradar.de/"
                    aria-label="Hamburg: Live"
                    style="--accent: #f05252; --delay: 85ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/hamburg-neu-640.webp 640w, ./assets/landing/hamburg-neu-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/hamburg-neu.png"
                            alt=""
                            width="1254"
                            height="1254"
                            decoding="async"
                            fetchpriority="high"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Hamburg</strong></span>
                        <span class="city-meta">
                            <span class="city-network">HVV</span>
                            <span class="city-status city-status--online">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Live
                            </span>
                        </span>
                    </span>
                </a>

                <a
                    class="city-card city-card--ready"
                    href="https://frankfurt.transitradar.de/"
                    aria-label="Frankfurt am Main: Live"
                    style="--accent: #009C95; --delay: 170ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/frankfurt-rmv-640.webp 640w, ./assets/landing/frankfurt-rmv-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/frankfurt-rmv.png"
                            alt=""
                            width="1254"
                            height="1254"
                            decoding="async"
                            fetchpriority="high"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Frankfurt am Main</strong></span>
                        <span class="city-meta">
                            <span class="city-network">RMV</span>
                            <span class="city-status city-status--online">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Live
                            </span>
                        </span>
                    </span>
                </a>

                <a
                    class="city-card city-card--ready"
                    href="https://hannover.transitradar.de/"
                    aria-label="Hannover: Live"
                    style="--accent: #1B325F; --delay: 255ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/hannover-gvh-640.webp 640w, ./assets/landing/hannover-gvh-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/hannover-gvh.png"
                            alt=""
                            width="1254"
                            height="1254"
                            loading="lazy"
                            decoding="async"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Hannover</strong></span>
                        <span class="city-meta">
                            <span class="city-network">GVH</span>
                            <span class="city-status city-status--online">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Live
                            </span>
                        </span>
                    </span>
                </a>

                <article
                    class="city-card city-card--soon"
                    aria-label="Köln: Coming soon"
                    style="--accent: #007D64; --delay: 340ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/koeln-vrs-640.webp 640w, ./assets/landing/koeln-vrs-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/koeln-vrs.png"
                            alt=""
                            width="1254"
                            height="1254"
                            loading="lazy"
                            decoding="async"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Köln</strong></span>
                        <span class="city-meta">
                            <span class="city-network">VRS</span>
                            <span class="city-status city-status--pending">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Coming soon
                            </span>
                        </span>
                    </span>
                </article>

                <article
                    class="city-card city-card--soon"
                    aria-label="Düsseldorf: Coming soon"
                    style="--accent: #00A878; --delay: 425ms"
                >
                    <picture class="city-image-wrap" aria-hidden="true">
                        <source
                            type="image/webp"
                            srcset="./assets/landing/duesseldorf-vrr-640.webp 640w, ./assets/landing/duesseldorf-vrr-1254.webp 1254w"
                            sizes="(max-width: 720px) calc(100vw - 2rem), (max-width: 1020px) calc(50vw - 2.5rem), 390px"
                        >
                        <img
                            src="./assets/landing/duesseldorf-vrr.png"
                            alt=""
                            width="1254"
                            height="1254"
                            loading="lazy"
                            decoding="async"
                        >
                    </picture>
                    <span class="city-info">
                        <span class="city-heading"><strong>Düsseldorf</strong></span>
                        <span class="city-meta">
                            <span class="city-network">VRR</span>
                            <span class="city-status city-status--pending">
                                <span class="api-status-dot" aria-hidden="true"></span>
                                Coming soon
                            </span>
                        </span>
                    </span>
                </article>
            </div>

            <div class="more-cities">
                <span class="more-label">Weitere Städte folgen bald</span>
                <span class="city-chip-row" aria-label="Weitere geplante Städte">
                    <span class="city-chip">Dortmund</span>
                    <span class="city-chip">Stuttgart</span>
                    <span class="city-chip">Essen</span>
                </span>
            </div>

            <footer class="landing-footer">
                <a href="/datenschutz">Datenschutz</a>
            </footer>
        </section>
    </main>
</body>
</html>
